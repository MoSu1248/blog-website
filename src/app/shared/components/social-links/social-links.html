<ul class="flex gap-4">
  @for (link of links; track link.name) {
    <li>
      <a
        [href]="link.url"
        target="_blank"
        rel="noopener noreferrer"
        class="nav-link flex items-center justify-center transition-all"
        [ngClass]="{
          'rounded-[10px] border border-neutral-700 p-2': variant === 'outline',
          'p-1': variant === 'default',
        }"
        [attr.aria-label]="link.ariaLabel"
      >
        <ng-container *ngComponentOutlet="iconMap[link.icon]" />
      </a>
    </li>
  }
</ul>
