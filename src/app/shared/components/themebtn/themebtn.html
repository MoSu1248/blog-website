@if (theme === 'dark') {
  <button
    (click)="toggleTheme()"
    class="p-2 border border-neutral-600 rounded-[8px] cursor-pointer btn-hover"
    aria-label="light mode button"
  >
    <app-sun-icon></app-sun-icon>
  </button>
} @else {
  <button
    (click)="toggleTheme()"
    class="p-2 border border-neutral-600 rounded-[8px] cursor-pointer btn-hover"
    aria-label="dark mode button"
  >
    <app-moon-icon></app-moon-icon>
  </button>
}
